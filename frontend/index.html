<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGP - Iniciar Sesion</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐷</text></svg>">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo">
        <i class="bi bi-piggy-bank" style="font-size: 2.5rem; color: var(--primary);"></i>
        <h1>SGP</h1>
        <p>Sistema de Gestion Porcina</p>
      </div>

      <!-- ========== LOGIN ========== -->
      <div id="loginSection">
        <div id="loginAlert" class="alert d-none auth-alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="loginUsername" class="form-label">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="loginUsername" placeholder="Tu nombre de usuario" required autofocus>
            </div>
          </div>

          <div class="mb-3">
            <label for="loginPassword" class="form-label">Contrasena</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="loginPassword" placeholder="Tu contrasena" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-2">Ingresar</button>
        </form>

        <div class="toggle-form">
          No tenes cuenta? <a href="#" data-toggle-form="register">Registrate</a>
        </div>
      </div>

      <!-- ========== REGISTER ========== -->
      <div id="registerSection" class="d-none">
        <div id="registerAlert" class="alert d-none auth-alert"></div>

        <form id="registerForm" novalidate>
          <div class="mb-3">
            <label for="regUsername" class="form-label">Usuario <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="regUsername" placeholder="Minimo 3 caracteres" required minlength="3">
            </div>
          </div>

          <div class="mb-3">
            <label for="regEmail" class="form-label">Email <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="regEmail" placeholder="tu@email.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="regNombre" class="form-label">Nombre completo</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
              <input type="text" class="form-control" id="regNombre" placeholder="Nombre y apellido">
            </div>
          </div>

          <div class="mb-3">
            <label for="regEstablecimiento" class="form-label">Establecimiento / Empresa</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-shop"></i></span>
              <input type="text" class="form-control" id="regEstablecimiento" placeholder="Ej: Estancia La Aurora">
            </div>
          </div>

          <div class="mb-3">
            <label for="regPassword" class="form-label">Contrasena <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="regPassword" placeholder="Minimo 6 caracteres" required minlength="6">
            </div>
          </div>

          <div class="mb-3">
            <label for="regPassword2" class="form-label">Confirmar contrasena <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="regPassword2" placeholder="Repetir contrasena" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-2">Crear cuenta</button>
        </form>

        <div class="toggle-form">
          Ya tenes cuenta? <a href="#" data-toggle-form="login">Iniciar sesion</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
