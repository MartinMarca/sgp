<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGP - Panel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐷</text></svg>">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">

    <!-- ========== SIDEBAR ========== -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h2><i class="bi bi-piggy-bank me-2"></i>SGP</h2>
        <small id="sidebarEstablecimiento">Gestion Porcina</small>
      </div>

      <div class="sidebar-nav">
        <!-- Principal -->
        <div class="nav-section">Principal</div>
        <a href="#" class="nav-link active" data-page="dashboard">
          <i class="bi bi-grid-1x2"></i> Inicio
        </a>
        <a href="#" class="nav-link" data-page="granjas">
          <i class="bi bi-building"></i> Granjas
        </a>

        <!-- Animales -->
        <div class="nav-section">Animales</div>
        <a href="#" class="nav-link" data-page="cerdas">
          <i class="bi bi-gender-female"></i> Cerdas
        </a>
        <a href="#" class="nav-link" data-page="padrillos">
          <i class="bi bi-gender-male"></i> Padrillos
        </a>

        <!-- Ciclo Reproductivo -->
        <div class="nav-section">Ciclo Reproductivo</div>
        <a href="#" class="nav-link" data-page="servicios">
          <i class="bi bi-heart-pulse"></i> Servicios
        </a>
        <a href="#" class="nav-link" data-page="partos">
          <i class="bi bi-plus-circle"></i> Partos
        </a>
        <a href="#" class="nav-link" data-page="destetes">
          <i class="bi bi-box-arrow-right"></i> Destetes
        </a>

        <!-- Instalaciones -->
        <div class="nav-section">Instalaciones</div>
        <a href="#" class="nav-link" data-page="corrales">
          <i class="bi bi-grid-3x3-gap"></i> Corrales
        </a>
        <a href="#" class="nav-link" data-page="lotes">
          <i class="bi bi-collection"></i> Lotes
        </a>

        <!-- Sanidad -->
        <div class="nav-section">Sanidad</div>
        <a href="#" class="nav-link" data-page="muertes">
          <i class="bi bi-clipboard2-pulse"></i> Muertes
        </a>
        <a href="#" class="nav-link" data-page="ventas">
          <i class="bi bi-cart-check"></i> Ventas
        </a>

        <!-- Analisis -->
        <div class="nav-section">Analisis</div>
        <a href="#" class="nav-link" data-page="calendario">
          <i class="bi bi-calendar-event"></i> Calendario
        </a>
        <a href="#" class="nav-link" data-page="estadisticas">
          <i class="bi bi-graph-up"></i> Estadisticas
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="d-flex align-items-center justify-content-between">
          <div>
            <div class="user-name" id="sidebarUserName">Usuario</div>
          </div>
          <button class="btn-logout" id="btnLogout" title="Cerrar sesion">
            <i class="bi bi-box-arrow-right"></i> Salir
          </button>
        </div>
      </div>
    </nav>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="main-content">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" id="sidebarToggle">
            <i class="bi bi-list"></i>
          </button>
          <h1 class="page-title" id="pageTitle">Inicio</h1>
        </div>
        <div>
          <span class="text-muted" style="font-size: 0.8rem;" id="granjaActual"></span>
        </div>
      </div>

      <!-- Content -->
      <div class="content-area" id="contentArea">
        <!-- El contenido se carga dinamicamente -->
        <div class="loading-spinner">
          <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/modules/granjas.js"></script>
  <script src="js/modules/corrales.js"></script>
  <script src="js/modules/cerdas.js"></script>
  <script src="js/modules/padrillos.js"></script>
  <script src="js/modules/servicios.js"></script>
  <script src="js/modules/partos.js"></script>
  <script src="js/modules/destetes.js"></script>
  <script src="js/modules/lotes.js"></script>
  <script src="js/modules/muertes_lechones.js"></script>
  <script src="js/modules/ventas.js"></script>
  <script src="js/modules/calendario.js"></script>
  <script src="js/modules/estadisticas.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
